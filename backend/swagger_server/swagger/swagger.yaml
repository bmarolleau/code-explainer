openapi: 3.0.0
info:
  title: Language Model API
  version: 1.0.0
servers:
- url: /
paths:
  /v1/generate:
    post:
      summary: Generate text using a language model
      operationId: v1_generate_post
      requestBody:
        description: JSON request body
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1_generate_body'
        required: true
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/inline_response_200'
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      x-openapi-router-controller: swagger_server.controllers.default_controller
components:
  schemas:
    v1generate_parameters_moderations_hap:
      type: object
      properties:
        input:
          type: boolean
          description: Whether to moderate the input.
        threshold:
          type: number
          description: Moderation threshold.
        output:
          type: boolean
          description: Whether to moderate the output.
    v1generate_parameters_moderations:
      type: object
      properties:
        hap:
          $ref: '#/components/schemas/v1generate_parameters_moderations_hap'
    v1generate_parameters:
      type: object
      properties:
        decoding_method:
          type: string
          description: "Decoding method (e.g., \"greedy\")."
        repetition_penalty:
          type: number
          description: Repetition penalty.
        min_new_tokens:
          type: integer
          description: Minimum number of new tokens.
        max_new_tokens:
          type: integer
          description: Maximum number of new tokens.
        moderations:
          $ref: '#/components/schemas/v1generate_parameters_moderations'
    v1_generate_body:
      type: object
      properties:
        model_id:
          type: string
          description: ID of the language model.
        inputs:
          type: array
          description: Input text(s) for the language model.
          items:
            type: string
        parameters:
          $ref: '#/components/schemas/v1generate_parameters'
    inline_response_200:
      type: object
      properties:
        result:
          type: string
          description: Generated text from the language model.
      example:
        result: result

